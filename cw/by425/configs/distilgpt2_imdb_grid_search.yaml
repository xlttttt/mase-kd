teacher:
  model_name: mnoukhov/gpt2-imdb-sentiment-classifier

student:
  model_name: distilgpt2
  num_labels: 2

training:
  batch_size: 8
  learning_rate: 0.00002
  num_epochs: 2
  warmup_ratio: 0.06
  weight_decay: 0.01
  seed: 42
  max_seq_length: 256
  train_subset: 5000
  test_subset: 2000

grid:
  alpha: [0.3, 0.5, 0.7]
  temperature: [2.0, 4.0, 6.0]

output:
  dir: outputs/gpt2_imdb_grid_search
