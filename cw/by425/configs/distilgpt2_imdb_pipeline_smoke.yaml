teacher:
  model_name: mnoukhov/gpt2-imdb-sentiment-classifier

student:
  model_name: distilgpt2
  num_labels: 2

pruning:
  sparsity: 0.1

training:
  batch_size: 4
  learning_rate: 0.00002
  num_epochs: 1
  warmup_ratio: 0.06
  weight_decay: 0.01
  seed: 42
  max_seq_length: 256
  train_subset: 512
  test_subset: 256

kd:
  alpha: 0.5
  temperature: 4.0

output:
  dir: outputs/gpt2_imdb_pipeline_smoke
