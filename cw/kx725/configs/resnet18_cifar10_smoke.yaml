# ResNet18 / CIFAR-10 smoke configuration
# Purpose: Fast A-E pipeline validation (~1-3 min on CPU, <1 min on GPU)
# Use:   python -m mase_kd.runners.run_pipeline \
#             --model resnet18 --dataset cifar10 \
#             --sparsity 0.5 --profile smoke
profile: smoke

model:
  arch: resnet18
  num_classes: 10
  teacher_arch: resnet18  # dense A-checkpoint reused as KD teacher for D/E

teacher:
  arch: resnet18  # same architecture; dense A-checkpoint provides teacher signal

data:
  dir: datasets/cifar10
  num_classes: 10
  val_split: 0.1
  subset_size: 5000   # 5 000 train + 500 val from the 50 000 CIFAR-10 train images

dense_training:
  epochs: 2
  batch_size: 128
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  lr_schedule: cosine
  seed: 42

pruning:
  sparsity: 0.5

finetune:
  epochs: 1
  batch_size: 128
  learning_rate: 0.01

kd:
  alpha: 0.5
  temperature: 4.0
  epochs: 1
  batch_size: 128
  learning_rate: 0.01

kd_finetune:
  epochs: 1
  batch_size: 128
  learning_rate: 0.001

output:
  dir: cw/kx725/outputs/resnet18/cifar10
